<!DOCTYPE html><html><body>
<script src="https://georgeweigt.github.io/eigenmath.js"></script>
<textarea id="stdin" rows="24" cols="80" style="font-family:courier;font-size:1em">
"Problem 11.30"

"Part (b)"

A = sin(kx x + ky y + kz z - omega t) (E0x,E0y,E0z) / omega

-- p dot A

T1 = -i hbar div(A psi())

-- A dot p

T2 = dot(A, -i hbar grad(psi()))

check(T1 + T2 == 2 T2 - i hbar div(A) psi())

H = e / m T2

Y = exp(i kx x + i ky y + i kz z - i omega t)

Y1 = e / (2 i m omega) Y
Y2 = e / (2 i m omega) conj(Y)

check(H == (Y1 - Y2) dot((E0x,E0y,E0z), -i hbar grad(psi())))

"ok"
